# Production (APP_ENV=prod) — prefer config/dev.yaml with APP_ENV=dev; kept for reference.
http_port: "8080"
gin_mode: release

database_url: "" # required — production Postgres URL

jwt_secret: "" # required — strong secret
jwt_ttl_hours: 72

allow_self_kyc_verify: false

azure:
  storage_account: ""
  storage_key: ""
  storage_container: ""

twilio:
  account_sid: ""
  auth_token: ""
  from_number: ""

payments:
  customer_commission_percent: 2
  owner_commission_percent: 1.5
  gst_percent_on_commission: 18

razorpay:
  key_id: ""
  key_secret: ""

app:
  public_url: https://cm-p2-p-frontend.vercel.app

cors:
  allowed_origins:
    - https://cm-p2-p-frontend.vercel.app
