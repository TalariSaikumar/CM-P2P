# Build and push the Go API image to Azure Container Registry.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ACR_LOGIN_SERVER   e.g. sureforcedevacr.azurecr.io
#   ACR_USERNAME       registry username (often the registry name without .azurecr.io)
#   ACR_PASSWORD       from Azure Portal → ACR → Access keys (never commit this)
#   ACR_REPOSITORY     image repository name only, e.g. sureforce
#   ACR_IMAGE_TAG      tag only, e.g. planoption or stag-2026-04-29
#
# Optional: change branches below to match your deployment branch.
# Image includes only backend/config/{APP_ENV}.yaml (build-arg). Default stag; override
# with repository variable DOCKER_APP_ENV (dev | stag | prod) or edit the build-args step.

name: Build and push Docker image to Azure Container Registry

on:
  push:
    branches:
      - Stag-PO
  workflow_dispatch:
    inputs:
      app_env:
        description: "Which config YAML to bake in (dev / stag / prod)"
        required: false
        default: stag
        type: choice
        options:
          - dev
          - stag
          - prod

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Resolve APP_ENV for image build
        id: appenv
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.app_env }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ vars.DOCKER_APP_ENV }}" ]; then
            echo "value=${{ vars.DOCKER_APP_ENV }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=stag" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/${{ secrets.ACR_REPOSITORY }}:${{ secrets.ACR_IMAGE_TAG }}
          build-args: APP_ENV=${{ steps.appenv.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
